<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Live Fitness Coach</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }
    h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
    h1 span { color: #4ade80; }
    #status {
      font-size: 14px;
      color: #888;
      height: 20px;
    }
    #status.connected { color: #4ade80; }
    #status.error { color: #f87171; }
    #orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #4ade80, #16a34a);
      box-shadow: 0 0 40px rgba(74, 222, 128, 0.3);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      user-select: none;
    }
    #orb.listening {
      animation: pulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 60px rgba(74, 222, 128, 0.6);
    }
    #orb.speaking {
      background: radial-gradient(circle at 40% 40%, #60a5fa, #2563eb);
      box-shadow: 0 0 60px rgba(96, 165, 250, 0.6);
      animation: pulse 0.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    #label {
      font-size: 13px;
      color: #555;
    }
    #controls {
      display: flex;
      gap: 16px;
    }
    button {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    #startBtn { background: #4ade80; color: #000; }
    #stopBtn { background: #374151; color: #fff; }
    #log {
      width: 360px;
      max-height: 160px;
      overflow-y: auto;
      background: #1a1a1a;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1>Gemini Live <span>Fitness Coach</span></h1>
  <p id="status">Connecting...</p>

  <div id="orb">🎤</div>
  <p id="label">Tap to start talking</p>

  <div id="controls">
    <button id="startBtn" disabled>Start Talking</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <div id="log">Waiting for connection...<br></div>

  <script>
    const WS_URL = window.location.hostname === 'localhost' || window.location.hostname === ''
      ? 'ws://localhost:8080'
      : 'wss://gemini-live-test-production.up.railway.app';

    const orb = document.getElementById('orb');
    const statusEl = document.getElementById('status');
    const labelEl = document.getElementById('label');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const logEl = document.getElementById('log');

    let ws, audioContext, processor, source, stream;
    let audioQueue = [], isPlaying = false;

    function log(msg) {
      logEl.innerHTML += msg + '<br>';
      logEl.scrollTop = logEl.scrollHeight;
    }

    function connectWS() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        log('Connected to backend');
      };

      ws.onmessage = async (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'status') {
          statusEl.textContent = msg.message;
          statusEl.className = 'connected';
          startBtn.disabled = false;
          log('✅ ' + msg.message);
        }

        if (msg.type === 'audio') {
          orb.className = 'speaking';
          orb.textContent = '🔊';
          labelEl.textContent = 'Coach is speaking...';
          audioQueue.push(msg.data);
          if (!isPlaying) playNext();
        }

        if (msg.type === 'turnComplete') {
          log('Coach finished speaking');
        }

        if (msg.type === 'error') {
          statusEl.textContent = 'Error: ' + msg.message;
          statusEl.className = 'error';
          log('❌ ' + msg.message);
        }
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected — refresh to reconnect';
        statusEl.className = 'error';
        startBtn.disabled = true;
      };

      ws.onerror = () => {
        statusEl.textContent = 'Connection failed — is server running?';
        statusEl.className = 'error';
        log('❌ WebSocket error. Make sure server.js is running.');
      };
    }

    async function playNext() {
      if (!audioQueue.length) {
        isPlaying = false;
        orb.className = '';
        orb.textContent = '🎤';
        labelEl.textContent = 'Tap to start talking';
        return;
      }
      isPlaying = true;
      const base64 = audioQueue.shift();
      const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      const playCtx = new AudioContext({ sampleRate: 24000 });
      const buffer = playCtx.createBuffer(1, bytes.length / 2, 24000);
      const channel = buffer.getChannelData(0);
      const view = new DataView(bytes.buffer);
      for (let i = 0; i < bytes.length / 2; i++) {
        channel[i] = view.getInt16(i * 2, true) / 32768;
      }
      const src = playCtx.createBufferSource();
      src.buffer = buffer;
      src.connect(playCtx.destination);
      src.onended = playNext;
      src.start();
    }

    startBtn.onclick = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext({ sampleRate: 16000 });
        source = audioContext.createMediaStreamSource(stream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);

        processor.onaudioprocess = (e) => {
          if (ws.readyState !== WebSocket.OPEN) return;
          const float32 = e.inputBuffer.getChannelData(0);
          const pcm16 = new Int16Array(float32.length);
          for (let i = 0; i < float32.length; i++) {
            pcm16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
          }
          const base64 = btoa(String.fromCharCode(...new Uint8Array(pcm16.buffer)));
          ws.send(JSON.stringify({ type: 'audio', data: base64 }));
        };

        source.connect(processor);
        processor.connect(audioContext.destination);

        orb.className = 'listening';
        orb.textContent = '🎤';
        labelEl.textContent = 'Listening... speak now';
        startBtn.disabled = true;
        stopBtn.disabled = false;
        log('🎤 Mic started — speak now');
      } catch (e) {
        log('❌ Mic error: ' + e.message);
      }
    };

    stopBtn.onclick = () => {
      if (processor) processor.disconnect();
      if (source) source.disconnect();
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (audioContext) audioContext.close();
      orb.className = '';
      orb.textContent = '🎤';
      labelEl.textContent = 'Tap to start talking';
      startBtn.disabled = false;
      stopBtn.disabled = true;
      log('⏹ Mic stopped');
    };

    connectWS();
  </script>
</body>
</html>
